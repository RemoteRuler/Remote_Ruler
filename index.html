<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Remote Ruler Search - A minimalist, privacy-focused search experience." />
    <title>Remote Ruler | Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Top Navigation Bar (Apple Style) -->
    <nav class="global-nav">
        <div class="nav-content">
            <div class="brand">
                <img src="Logo/Remote_Ruler.png" alt="Remote Ruler" class="brand-logo">
                <span class="brand-text">Remote Ruler</span>
            </div>
            <div class="status-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shield-icon">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>

        </div>
    </nav>

    <!-- Main Content -->
    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="quoteContainer">
                <span class="quote-text">Redefining search.</span><br>
                <span class="bold-text">Private by design.</span>
            </h1>

            <div class="search-container">
                <form id="searchForm" role="search" autocomplete="off" class="search-pill">
                    <div class="search-icon-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <input type="text" id="searchInput" name="q" placeholder="Search the web securely" required />
                </form>
            </div>
        </div>
    </main>
